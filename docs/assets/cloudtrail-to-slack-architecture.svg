<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="860" height="280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" fill="#f4f6f8" rx="12"/>

  <!-- ── CloudTrail ── -->
  <rect x="30" y="90" width="140" height="70" rx="8" fill="#232F3E"/>
  <text x="100" y="121" text-anchor="middle" fill="#FF9900" font-family="Arial,sans-serif" font-size="11" font-weight="bold">AWS</text>
  <text x="100" y="138" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="12" font-weight="bold">CloudTrail</text>
  <text x="100" y="178" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Records API calls</text>
  <text x="100" y="191" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">writes .json.gz to S3</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="125" x2="215" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="193" y="118" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="9">~5 min</text>

  <!-- ── S3 Bucket ── -->
  <rect x="215" y="90" width="140" height="70" rx="8" fill="#569A31"/>
  <text x="285" y="121" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Amazon S3</text>
  <text x="285" y="138" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Bucket</text>
  <text x="285" y="178" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Stores CloudTrail</text>
  <text x="285" y="191" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">log files</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="125" x2="400" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="378" y="118" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="9">ObjectCreated</text>

  <!-- ── Lambda ── -->
  <rect x="400" y="90" width="160" height="70" rx="8" fill="#FF9900"/>
  <text x="480" y="121" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">AWS Lambda</text>
  <text x="480" y="138" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11">Parse + Filter Events</text>
  <text x="480" y="178" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Applies events_to_track</text>
  <text x="480" y="191" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">and ignore_rules</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="125" x2="610" y2="125" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="118" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="9">Webhook</text>

  <!-- ── Slack ── -->
  <rect x="610" y="90" width="140" height="70" rx="8" fill="#4A154B"/>
  <text x="680" y="121" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Slack</text>
  <text x="680" y="138" text-anchor="middle" fill="#E8B4E8" font-family="Arial,sans-serif" font-size="11">Incoming Webhook</text>
  <text x="680" y="178" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Delivers alert to</text>
  <text x="680" y="191" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Slack channel</text>

  <!-- ── CloudWatch Logs (dashed, below Lambda) ── -->
  <line x1="480" y1="160" x2="480" y2="210" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)"/>
  <rect x="400" y="210" width="160" height="40" rx="8" fill="#1A73E8"/>
  <text x="480" y="234" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">CloudWatch Logs</text>
  <text x="480" y="263" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="10">Lambda execution logs</text>

  <!-- Title -->
  <text x="430" y="40" text-anchor="middle" fill="#232F3E" font-family="Arial,sans-serif" font-size="15" font-weight="bold">CloudTrail to Slack — Architecture</text>
</svg>
